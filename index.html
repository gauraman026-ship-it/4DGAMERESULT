<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS LIVE 2D</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 10px; }
        .neon-title { font-size: 1.8em; color: #fff; text-shadow: 0 0 10px #f00; margin: 15px 0; }
        .timer-box { color: #ff0; padding: 15px; border: 2px solid #ff0; font-size: 1.4em; border-radius: 8px; margin-bottom: 20px; }
        .result-cell { font-size: 2.5em; color: #fff; margin: 20px; border: 2px solid #f00; padding: 20px; border-radius: 10px; display: inline-block; background: #200; }
        #adminPanel { display:none; margin-top:30px; border: 1px solid #f00; padding: 10px; }
    </style>
</head>
<body>

    <div class="neon-title">CANVAS LIVE 2D</div>
    <div class="timer-box" id="timer">Syncing...</div>
    <div id="results">Loading result...</div>

    <div id="adminPanel">
        <input type="text" id="numInput" placeholder="Enter Result">
        <button onclick="updateFirebase()">UPDATE FOR ALL</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCNLfjZ0hctznOLuyD6EIg-Z_ef-KO8i3Q",
            databaseURL: "https://canvas2d-result-default-rtdb.firebaseio.com",
            projectId: "canvas2d-result"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Admin Update
        function updateFirebase() {
            let val = document.getElementById('numInput').value;
            db.ref('liveResult').set(val);
            alert("Updated!");
        }

        // 2. Real-time Listener
        db.ref('liveResult').on('value', (snapshot) => {
            document.getElementById('results').innerHTML = `<div class="result-cell">${snapshot.val() || "Waiting..."}</div>`;
        });

        // 3. Auto Random Generator Logic (15 min cycle)
        setInterval(() => {
            let now = new Date();
            // Agar minute 0, 15, 30, 45 hai, toh random generate karo (Sirf ek baar)
            if (now.getMinutes() % 15 === 0 && now.getSeconds() === 0) {
                let randomNum = Math.floor(1000 + Math.random() * 9000);
                db.ref('liveResult').set(randomNum.toString());
            }
        }, 1000);

        // 4. Timer Display
        setInterval(() => {
            let now = new Date();
            let remM = 14 - (now.getMinutes() % 15);
            let remS = 59 - now.getSeconds();
            document.getElementById('timer').innerText = `Next Draw In: ${remM.toString().padStart(2, '0')}m ${remS.toString().padStart(2, '0')}s`;
        }, 1000);

        // Admin Panel Toggle
        let clickCount = 0;
        document.body.onclick = () => {
            clickCount++;
            if(clickCount >= 6) {
                let p = prompt("Admin Password:");
                if(p === "24081996") document.getElementById('adminPanel').style.display = 'block';
                clickCount = 0;
            }
        };
    </script>
</body>
</html>
