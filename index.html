<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CANVAS LIVE 2D</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0e14; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .neon-title { text-align: center; font-size: 1.8em; color: #d4af37; text-shadow: 0 0 15px rgba(212,175,55,0.5); margin: 15px 0; font-weight: bold; }
        .timer-box { text-align: center; color: #fff; font-size: 1.4em; font-weight: bold; background: #1e2a38; padding: 15px; border: 1px solid #d4af37; border-radius: 12px; }
        .section-title { color: #d4af37; font-size: 1.1em; margin: 25px 0 10px; padding: 10px; border: 1px solid #d4af37; border-radius: 5px; text-align: center; cursor: pointer; }
        .result-block { border: 1px solid #2a3a4a; margin-bottom: 15px; background: #131b26; padding: 12px; border-radius: 10px; }
        .time-header { font-weight: bold; display: flex; align-items: center; margin-bottom: 8px; font-size: 1.1em; }
        .live-dot { height: 10px; width: 10px; background-color: #d4af37; border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } }
        .chart-table { display: grid; grid-template-columns: 40px 1fr; gap: 8px; align-items: center; }
        .label { background: #1e2a38; padding: 10px 2px; text-align: center; font-weight: bold; color: #d4af37; border-radius: 4px; }
        .row-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; }
        .cell { background: #1e2a38; padding: 8px 1px; text-align: center; font-weight: bold; border-radius: 3px; font-size: 0.85em; }
        #adminPanel { display: none; margin-top: 20px; padding: 15px; border: 1px solid #d4af37; background: #131b26; border-radius: 10px; }
        textarea { width: 90%; background: #0a0e14; color: #fff; border: 1px solid #333; margin: 5px 0; padding: 8px; }
    </style>
</head>
<body>

    <div class="neon-title">CANVAS LIVE 2D</div>
    <div class="timer-box" id="timer">Syncing...</div>
    
    <div class="section-title">TODAY RESULTS</div>
    <div id="today-container"></div>
    
    <div class="section-title" onclick="toggleYesterday()">TAP FOR YESTERDAY RESULTS ▾</div>
    <div id="yesterday-container" style="display: none;"></div>

    <div id="adminPanel">
        <strong>ADMIN PANEL</strong><br>
        <textarea id="fixInput" placeholder="Fix (e.g. 1044, 3088)"></textarea><br>
        <textarea id="block10" placeholder="Block 10-19"></textarea><br>
        <textarea id="block30" placeholder="Block 30-39"></textarea><br>
        <textarea id="block50" placeholder="Block 50-59"></textarea><br>
        <button onclick="saveSettings()" style="width: 100%; padding: 10px; background: #d4af37; border:none; cursor:pointer;">SAVE SETTINGS</button>
    </div>
    
    <div style="position:fixed; bottom:0; right:0; width:100px; height:100px; z-index:9999;" onclick="handleAdmin()"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCNLfjZ0hctznOLuyD6EIg-Z_ef-KO8i3Q", databaseURL: "https://canvas2d-result-default-rtdb.firebaseio.com", projectId: "canvas2d-result" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let clickCount = 0;
        function handleAdmin() {
            clickCount++;
            if (clickCount === 4) {
                if(prompt("Enter Password:") === "24081996") document.getElementById('adminPanel').style.display = 'block';
                clickCount = 0;
            }
            setTimeout(() => { clickCount = 0; }, 3000);
        }

        function toggleYesterday() {
            const y = document.getElementById('yesterday-container');
            y.style.display = (y.style.display === 'none') ? 'block' : 'none';
        }

        function saveSettings() {
            db.ref('settings').set({ 
                fix: document.getElementById('fixInput').value,
                b10: document.getElementById('block10').value,
                b30: document.getElementById('block30').value,
                b50: document.getElementById('block50').value
            });
            alert("Settings Saved!");
        }

        function generateAndSave() {
            db.ref('settings').once('value', (snap) => {
                let s = snap.val() || {};
                let fixList = (s.fix || "").split(/[ ,]+/).filter(x => x.length > 0);
                let blocks = { '10': (s.b10 || "").split(/[ ,]+/), '30': (s.b30 || "").split(/[ ,]+/), '50': (s.b50 || "").split(/[ ,]+/) };

                db.ref('resultsData').once('value', (snapRes) => {
                    let currentHtml = snapRes.val() ? snapRes.val().html : "";
                    
                    let cleanedHtml = currentHtml
                        .replace(/<span class="live-dot"><\/span>/g, '')
                        .replace(/ LIVE/g, '')
                        .replace(/class="time-header"/g, 'class="time-header" style="color: #666;"');
                    
                    let timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
                    
                    let newBlock = `<div class="result-block">
                        <div class="time-header" style="color: #d4af37;"><span class="live-dot"></span>${timeString} LIVE</div>
                        <div class="chart-table">`;
                    
                    [10, 30, 50].forEach(sVal => {
                        newBlock += `<div class="label">${sVal}</div><div class="row-grid">`;
                        for(let i=0; i<10; i++) {
                            let prefix = sVal + i;
                            let val;
                            let fixVal = fixList.find(n => n.startsWith(prefix.toString()));
                            if (fixVal) { val = fixVal; } 
                            else {
                                do { val = prefix.toString() + Math.floor(Math.random()*100).toString().padStart(2,'0'); }
                                while (blocks[sVal.toString()].includes(val.substring(2)));
                            }
                            newBlock += `<div class="cell">${val}</div>`;
                        }
                        newBlock += `</div>`;
                    });
                    newBlock += `</div></div>`;
                    db.ref('resultsData').set({ html: newBlock + cleanedHtml });
                });
            });
        }

        db.ref('resultsData').on('value', (snap) => { if(snap.exists()) document.getElementById('today-container').innerHTML = snap.val().html; });
        db.ref('yesterdayData').on('value', (snap) => { if(snap.exists()) document.getElementById('yesterday-container').innerHTML = snap.val().html; });

        setInterval(() => {
            let now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            if ((h > 9 || (h === 9 && m >= 0)) && (h < 21 || (h === 21 && m <= 30))) {
                document.getElementById('timer').innerText = `Next Draw in ${14 - (m % 15)}m ${59 - s}s`;
                if (m % 15 === 0 && s === 0) {
                    let key = now.toDateString() + "-" + h + "-" + m;
                    db.ref('lastGenerated').once('value', (snap) => { if (snap.val() !== key) { generateAndSave(); db.ref('lastGenerated').set(key); } });
                }
            } else {
                document.getElementById('timer').innerText = "MARKET CLOSED";
                if (h === 21 && m === 31 && s === 0) {
                    db.ref('resultsData').once('value', (snap) => {
                        if(snap.val()) { 
                            let yDate = new Date();
                            yDate.setDate(yDate.getDate() - 1); // यह सही से पिछले दिन की तारीख सेट करेगा
                            let dateStr = yDate.toLocaleDateString();
                            let cleanHtml = snap.val().html.replace(/<span class="live-dot"><\/span>/g, '').replace(/ LIVE/g, '');
                            db.ref('yesterdayData').set({ html: `<div style="color:#d4af37; margin:10px 0; font-weight:bold;">DATE: ${dateStr}</div>` + cleanHtml }); 
                            db.ref('resultsData').remove(); 
                        }
                    });
                }
            }
        }, 1000);
    </script>
</body>
</html>
