<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CANVAS LIVE 2D</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .neon-title { text-align: center; font-size: 1.8em; color: #fff; text-shadow: 0 0 10px #f00; margin: 15px 0; }
        .timer-box { text-align: center; color: #ff0; font-size: 1.4em; font-weight: bold; background: #300; padding: 10px; border: 2px solid #ff0; border-radius: 8px; }
        .section-title { color: #f00; font-size: 1.3em; margin: 20px 0 10px; border-left: 4px solid #f00; padding-left: 10px; text-transform: uppercase; font-weight: bold; }
        .result-block { border: 2px solid #400; margin-bottom: 15px; background: #150000; padding: 10px; border-radius: 8px; }
        .time-header { color: #f00; font-size: 1.1em; margin-bottom: 10px; font-weight: bold; display: flex; align-items: center; }
        .live-dot { height: 12px; width: 12px; background-color: #f00; border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .chart-table { display: grid; grid-template-columns: 40px 1fr; gap: 8px; align-items: center; }
        .label { background: #4a4a4a; padding: 10px 0; text-align: center; font-size: 0.9em; font-weight: bold; border: 1px solid #777; }
        .row-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; }
        .cell { background: #200; padding: 10px 0; text-align: center; font-weight: bold; border: 1px solid #f00; font-size: 1em; }
        #adminPanel { display: none; margin-top: 20px; padding: 15px; border: 2px solid #f00; background: #300; border-radius: 8px; }
        textarea { width: 90%; background: #000; color: #fff; border: 1px solid #f00; margin: 5px 0; padding: 5px; }
    </style>
</head>
<body>

    <div class="neon-title">CANVAS LIVE 2D</div>
    <div class="timer-box" id="timer">Syncing...</div>
    <div class="section-title">TODAY RESULTS</div>
    <div id="today-container"></div>

    <div id="adminPanel">
        <strong style="color: #f00;">ADMIN PANEL</strong><br>
        <textarea id="fixInput" placeholder="Fix (e.g. 1044, 3088)"></textarea><br>
        <textarea id="block10" placeholder="Block 10-19 Suffix"></textarea><br>
        <textarea id="block30" placeholder="Block 30-39 Suffix"></textarea><br>
        <textarea id="block50" placeholder="Block 50-59 Suffix"></textarea><br>
        <button onclick="saveSettings()" style="width: 100%; padding: 10px; background: #f00; color: #fff; border:none; font-weight:bold; margin-bottom:10px;">SAVE SETTINGS</button>
        <button onclick="deleteAllRecords()" style="width: 100%; padding: 10px; background: #500; color: #fff; border:1px solid #f00; font-weight:bold;">DELETE ALL RECORDS</button>
    </div>
    
    <div style="position:fixed; bottom:0; right:0; width:100px; height:100px;" onclick="handleAdmin()"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCNLfjZ0hctznOLuyD6EIg-Z_ef-KO8i3Q", databaseURL: "https://canvas2d-result-default-rtdb.firebaseio.com", projectId: "canvas2d-result" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function deleteAllRecords() {
            if(confirm("Kya aap saara record delete karna chahte hain?")) {
                db.ref('resultsData').remove();
                db.ref('lastGenerated').remove();
                alert("Records delete ho gaye!");
                location.reload();
            }
        }

        let clickCount = 0;
        function handleAdmin() {
            clickCount++;
            if (clickCount === 3) {
                if(prompt("Enter Password:") === "24081996") document.getElementById('adminPanel').style.display = 'block';
                clickCount = 0;
            }
            setTimeout(() => { clickCount = 0; }, 3000);
        }

        function saveSettings() {
            db.ref('settings').set({
                fix: document.getElementById('fixInput').value,
                b10: document.getElementById('block10').value,
                b30: document.getElementById('block30').value,
                b50: document.getElementById('block50').value
            });
            alert("Settings Saved!");
        }

        function generateAndSave() {
            db.ref('settings').once('value', (snap) => {
                let s = snap.val() || {};
                let fixList = (s.fix || "").split(/[ ,]+/).filter(x => x.length > 0);
                let b10 = (s.b10 || "").split(/[ ,]+/).filter(x => x.length > 0);
                let b30 = (s.b30 || "").split(/[ ,]+/).filter(x => x.length > 0);
                let b50 = (s.b50 || "").split(/[ ,]+/).filter(x => x.length > 0);

                let currentHtml = document.getElementById('today-container').innerHTML;
                let cleanedHtml = currentHtml.replace(/<span class="live-dot"><\/span>/g, '').replace(/ LIVE/g, '');

                let timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
                let newBlock = `<div class="result-block"><div class="time-header"><span class="live-dot"></span>${timeString} LIVE</div><div class="chart-table">`;
                
                [[10, b10], [30, b30], [50, b50]].forEach(series => {
                    newBlock += `<div class="label">${series[0]}</div><div class="row-grid">`;
                    for(let i=0; i<10; i++) {
                        let prefix = series[0] + i;
                        let fixVal = fixList.find(n => n.startsWith(prefix.toString()));
                        let val = fixVal ? fixVal : prefix.toString() + Math.floor(Math.random()*100).toString().padStart(2,'0');
                        newBlock += `<div class="cell">${val}</div>`;
                    }
                    newBlock += `</div>`;
                });
                newBlock += `</div></div>`;
                
                db.ref('resultsData').set({ html: newBlock + cleanedHtml });
            });
        }

        db.ref('resultsData').on('value', (snap) => {
            if(snap.exists()) document.getElementById('today-container').innerHTML = snap.val().html;
        });

        setInterval(() => {
            let now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();

            if (h >= 9 && h < 22) {
                let remM = 14 - (m % 15);
                let remS = 59 - s;
                document.getElementById('timer').innerText = `Next Draw: ${remM}m ${remS}s`;

                if (m % 15 === 0 && s === 0) {
                    let currentTime = h + "-" + m + "-" + now.toDateString();
                    db.ref('lastGenerated').once('value', (snap) => {
                        if (snap.val() !== currentTime) {
                            generateAndSave();
                            db.ref('lastGenerated').set(currentTime);
                        }
                    });
                }
            } else {
                document.getElementById('timer').innerText = "MARKET CLOSED";
            }
        }, 1000);
    </script>
</body>
</html>
