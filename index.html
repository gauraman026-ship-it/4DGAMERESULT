<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CANVAS LIVE 4D</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #07090e;
            --card-bg: #101622;
            --accent-gold: #f39c12;
            --neon-gold: #ffb703;
            --text-main: #f1f5f9;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 12px; }
        
        .neon-title { 
            text-align: center; 
            font-size: 2.2em; 
            font-weight: 900; 
            letter-spacing: 2px;
            background: linear-gradient(180deg, #fff 20%, var(--neon-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(255, 183, 3, 0.4);
            margin: 20px 0 10px;
            text-transform: uppercase;
        }

        .timer-box { 
            text-align: center; 
            color: var(--neon-gold); 
            font-size: 1.2em; 
            font-weight: 800; 
            background: var(--card-bg); 
            padding: 16px; 
            border: 1px solid var(--accent-gold); 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .section-title { 
            color: var(--neon-gold); 
            font-size: 1.05em; 
            font-weight: 800;
            letter-spacing: 1px;
            margin: 20px 0 10px; 
            padding: 14px; 
            background: var(--card-bg);
            border: 1px solid var(--accent-gold); 
            border-radius: 12px; 
            text-align: center; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .result-date-heading { 
            text-align: center; 
            color: var(--neon-gold); 
            font-weight: 800; 
            margin: 15px 0; 
            font-size: 1.2em; 
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,183,3,0.3);
        }

        .result-block { 
            border: 1px solid rgba(243, 156, 18, 0.3); 
            margin-bottom: 16px; 
            background: var(--card-bg); 
            padding: 14px 10px; 
            border-radius: 14px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .time-header { 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            margin-bottom: 12px; 
            font-size: 1.15em; 
            color: var(--neon-gold); 
            letter-spacing: 0.5px;
        }

        .live-dot { 
            height: 9px; 
            width: 9px; 
            background-color: #2ecc71; 
            border-radius: 50%; 
            margin-right: 8px; 
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse-glow 1.2s infinite; 
        }

        @keyframes pulse-glow { 
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(46, 204, 113, 0); } 
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); } 
        }

        .table-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .chart-table { 
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 650px; 
        }

        .row-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .label { 
            background: linear-gradient(135deg, #162032, #0d131f); 
            padding: 9px 12px; 
            text-align: center; 
            font-weight: 800; 
            color: var(--neon-gold); 
            border: 1px solid rgba(243,156,18,0.4);
            border-radius: 8px; 
            font-size: 0.95em;
            flex-shrink: 0;
            width: 25px;
        }

        .row-grid { 
            display: flex; 
            gap: 5px; 
            flex-grow: 1;
        }
        
        .cell { 
            background: linear-gradient(135deg, #162032, #0d131f); 
            padding: 8px 2px; 
            text-align: center; 
            font-weight: 700; 
            border-radius: 8px; 
            font-size: 0.8em; 
            color: #ffffff; 
            border: 1px solid rgba(255,255,255,0.08);
            flex: 1;
            min-width: 52px;
        }

        .cell.highlight {
            border: 1px solid var(--neon-gold);
            box-shadow: 0 0 8px rgba(255, 183, 3, 0.4);
        }

        #adminPanel { 
            display: none; 
            margin-top: 25px; 
            padding: 18px; 
            border: 1px solid var(--accent-gold); 
            background: var(--card-bg); 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        textarea { 
            width: 95%; 
            background: #07090e; 
            color: #fff; 
            border: 1px solid rgba(243,156,18,0.4); 
            margin: 6px 0; 
            padding: 10px; 
            font-size: 0.95em; 
            border-radius: 6px;
            outline: none;
        }

        .admin-label { color: var(--neon-gold); font-size: 0.9em; font-weight: 700; display: block; margin-top: 10px; }
        
        button {
            background: linear-gradient(135deg, var(--accent-gold), #d35400);
            color: #fff;
            font-weight: 800;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(243,156,18,0.4);
            transition: filter 0.2s;
        }
    </style>
</head>
<body>
    <div class="neon-title">CANVAS LIVE 4D</div>
    <div class="timer-box" id="timer">NEXT DRAW IN: --m --s</div>
    <div class="section-title">TODAY LIVE RESULTS</div>
    <div id="today-container"></div>
    <div class="section-title" onclick="toggleYesterday()">TAP FOR YESTERDAY RESULTS ▾</div>
    <div id="yesterday-container" style="display: none;"></div>
    
    <div id="adminPanel">
        <strong>ADMIN CONFIGURATION PANEL</strong><br>
        
        <span class="admin-label">1. Block Avoid Numbers (Comma/Space separated):</span>
        <textarea id="avoidInput" placeholder="e.g. 1045, 3033"></textarea><br>
        
        <span class="admin-label">2. Fixed Result Numbers (Exact 4-digit):</span>
        <textarea id="fixInput" placeholder="e.g. 1045, 5341"></textarea><br>
        
        <button onclick="saveSettings()" style="width: 100%; padding: 12px; border:none; margin-top: 12px;">SAVE SETTINGS</button>
    </div>
    
    <div style="position:fixed; bottom:0; right:0; width:100px; height:100px; z-index:9999;" onclick="handleAdminTouch()"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCNLfjZ0hctznOLuyD6EIg-Z_ef-KO8i3Q", databaseURL: "https://canvas2d-result-default-rtdb.firebaseio.com", projectId: "canvas2d-result" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let todayStr = new Date().toLocaleDateString();

        db.ref('lastDate').on('value', (snap) => {
            let savedDate = snap.val();
            if (savedDate && savedDate !== todayStr) {
                db.ref('resultsData').once('value', (resSnap) => {
                    if (resSnap.exists()) {
                        let oldData = resSnap.val().html || "";
                        let yesterdayHeading = `<div class="result-date-heading">DATE: ${savedDate}</div>`;
                        db.ref('yesterdayData').set({ html: yesterdayHeading + oldData });
                    }
                    db.ref('resultsData').remove();
                    db.ref('lastDate').set(todayStr);
                });
            } else if (!savedDate) {
                db.ref('lastDate').set(todayStr);
            }
        });

        let touchCount = 0;
        let touchTimer = null;

        function handleAdminTouch() {
            touchCount++;
            clearTimeout(touchTimer);

            if (touchCount >= 5) {
                touchCount = 0;
                if(prompt("Enter Admin Password:") === "24081996") {
                    document.getElementById('adminPanel').style.display = 'block';
                    db.ref('settings').once('value', (snap) => {
                        let s = snap.val() || {};
                        if(s.fix) document.getElementById('fixInput').value = s.fix;
                        if(s.avoid) document.getElementById('avoidInput').value = s.avoid;
                    });
                }
            } else {
                touchTimer = setTimeout(() => {
                    touchCount = 0;
                }, 1000);
            }
        }

        function toggleYesterday() {
            const y = document.getElementById('yesterday-container');
            y.style.display = (y.style.display === 'none') ? 'block' : 'none';
        }

        function saveSettings() {
            db.ref('settings').set({ 
                fix: document.getElementById('fixInput').value.trim(),
                avoid: document.getElementById('avoidInput').value.trim()
            });
            alert("Settings Saved Successfully!");
        }

        let lastGeneratedMinute = -1;

        function autoGenerateCheck() {
            let now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();

            let isMarketOpen = (h > 9 || (h === 9 && m >= 0)) && (h < 21 || (h === 21 && m <= 30));

            if (isMarketOpen) {
                if (m % 15 === 0 && s === 0 && lastGeneratedMinute !== m) {
                    lastGeneratedMinute = m;
                    triggerAutoGeneration();
                }
            }
        }

        function triggerAutoGeneration() {
            db.ref('settings').once('value', (snap) => {
                let s = snap.val() || {};
                let fixList = (s.fix || "").split(/[ ,]+/).map(x => x.trim()).filter(x => x.length === 4);
                let avoidList = (s.avoid || "").split(/[ ,]+/).map(x => x.trim()).filter(x => x.length > 0);

                db.ref('resultsData').once('value', (snapRes) => {
                    let currentHtml = snapRes.val() ? snapRes.val().html : "";
                    
                    let cleanedHtml = currentHtml
                        .replace(/<span class="live-dot"><\/span>/g, '')
                        .replace(/ LIVE/g, '');
                    
                    let timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
                    let newBlock = `<div class="result-block"><div class="time-header"><span class="live-dot"></span>${timeString} LIVE</div><div class="table-scroll-wrapper"><div class="chart-table">`;
                    
                    let rowGroups = [
                        { label: "10", start: 10, end: 19 },
                        { label: "30", start: 30, end: 39 },
                        { label: "50", start: 50, end: 59 }
                    ];

                    rowGroups.forEach(group => {
                        newBlock += `<div class="row-container"><div class="label">${group.label}</div><div class="row-grid">`;
                        for(let num = group.start; num <= group.end; num++) {
                            let prefix = num.toString();
                            let assignedVal = "";
                            let isHighlighted = "";

                            let matchedFix = fixList.find(n => n.startsWith(prefix));
                            if (matchedFix) {
                                assignedVal = matchedFix;
                                isHighlighted = " highlight";
                            }

                            if (!assignedVal) {
                                let attempts = 0;
                                do {
                                    let rand1 = Math.floor(Math.random()*10).toString();
                                    let rand2 = Math.floor(Math.random()*10).toString();
                                    assignedVal = prefix + rand1 + rand2;
                                    attempts++;
                                } while (avoidList.includes(assignedVal) && attempts < 30);
                            }

                            newBlock += `<div class="cell${isHighlighted}">${assignedVal}</div>`;
                        }
                        newBlock += `</div></div>`;
                    });

                    newBlock += `</div></div></div>`;
                    
                    db.ref('resultsData').set({ html: newBlock + cleanedHtml });
                });
            });
        }

        db.ref('resultsData').on('value', (snap) => { 
            if(snap.exists()) {
                let todayHeading = `<div class="result-date-heading">DATE: ${todayStr}</div>`;
                document.getElementById('today-container').innerHTML = todayHeading + snap.val().html; 
            } else {
                document.getElementById('today-container').innerHTML = "<div style='text-align:center; color:#666; padding:20px;'>No Results Today Yet</div>";
            }
        });
        
        db.ref('yesterdayData').on('value', (snap) => { 
            if(snap.exists()) {
                document.getElementById('yesterday-container').innerHTML = snap.val().html; 
            } else {
                document.getElementById('yesterday-container').innerHTML = "<div style='text-align:center; color:#666; padding:20px;'>No Yesterday Data</div>";
            }
        });

        setInterval(() => {
            let now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            
            autoGenerateCheck();

            if ((h > 9 || (h === 9 && m >= 0)) && (h < 21 || (h === 21 && m <= 30))) {
                document.getElementById('timer').innerText = `NEXT DRAW IN: ${14 - (m % 15)}m ${59 - s}s`;
            } else {
                document.getElementById('timer').innerText = "MARKET CLOSED";
            }
        }, 1000);
    </script>
</body>
</html>
